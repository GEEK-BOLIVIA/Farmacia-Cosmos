<div id="carrito-wrapper" class="relative z-[100]">
    <div id="carrito-overlay"
        class="fixed inset-0 bg-black/60 backdrop-blur-sm opacity-0 hidden transition-opacity duration-300"></div>

    <div id="carrito-sidebar"
        class="fixed top-0 right-0 h-full w-full sm:w-[450px] bg-white dark:bg-gray-900 shadow-2xl transform translate-x-full transition-transform duration-500 ease-in-out flex flex-col">

        <div
            class="p-6 border-b border-gray-100 dark:border-gray-800 flex items-center justify-between bg-white dark:bg-gray-900 sticky top-0 z-10">
            <div class="flex items-center gap-3">
                <div class="bg-primary/10 p-2 rounded-xl">
                    <span class="material-icons text-primary">shopping_basket</span>
                </div>
                <div>
                    <h2 class="text-xl font-bold text-gray-800 dark:text-white leading-none">Mi Carrito</h2>
                    <span id="cart-count-badge" class="text-xs text-gray-500 font-medium">0 productos</span>
                </div>
            </div>
            <button id="close-cart"
                class="group p-2 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-full transition-all">
                <span class="material-icons text-gray-400 group-hover:text-red-500 transition-colors">close</span>
            </button>
        </div>

        <div id="carrito-items-container" class="flex-grow overflow-y-auto p-6 space-y-4">
            <div class="flex flex-col items-center justify-center h-full text-center py-20">
                <div class="w-32 h-32 bg-gray-50 dark:bg-gray-800 rounded-full flex items-center justify-center mb-6">
                    <span class="material-icons text-6xl text-gray-300">add_shopping_cart</span>
                </div>
                <h3 class="text-lg font-semibold text-gray-800 dark:text-white mb-2">Tu carrito está vacío</h3>
                <p class="text-gray-500 dark:text-gray-400 max-w-[250px]">Parece que aún no has añadido nada a tu
                    selección natural.</p>
                <button onclick="toggleCart()" class="mt-8 text-primary font-bold hover:underline">Continuar
                    comprando</button>
            </div>
        </div>

        <div class="p-6 border-t border-gray-100 dark:border-gray-800 bg-gray-50/50 dark:bg-gray-800/50">
            <div class="space-y-3 mb-6">
                <div class="flex justify-between text-gray-600 dark:text-gray-400">
                    <span>Subtotal</span>
                    <span id="cart-subtotal">Bs 0.00</span>
                </div>
                <div class="flex justify-between items-end">
                    <span class="text-lg font-bold text-gray-800 dark:text-white">Total</span>
                    <div class="text-right">
                        <span id="cart-total" class="text-2xl font-black text-primary block">Bs 0.00</span>
                        <span class="text-[10px] text-gray-400 uppercase tracking-widest font-bold">Impuestos
                            incluidos</span>
                    </div>
                </div>
            </div>

            <button id="btn-checkout"
                class="w-full bg-primary hover:bg-primary-dark text-white py-4 rounded-2xl font-bold uppercase tracking-widest shadow-lg shadow-primary/30 transition-all active:scale-95 flex items-center justify-center gap-3">
                Finalizar Pedido
                <span class="material-icons text-xl">arrow_forward</span>
            </button>

            <p class="text-center mt-4 text-[11px] text-gray-400 font-medium flex items-center justify-center gap-1">
                <span class="material-icons text-xs">lock</span> Pago seguro y procesado por WhatsApp
            </p>
        </div>
    </div>
</div>
