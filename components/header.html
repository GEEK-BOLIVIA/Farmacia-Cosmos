<div class="bg-white dark:bg-surface-dark px-4 py-4 transition-colors duration-300">
    <div class="max-w-7xl mx-auto flex flex-col lg:flex-row items-center justify-between gap-4 lg:gap-8">
        <div class="w-full flex flex-col md:flex-row items-center justify-between gap-4 lg:contents">

            <div class="flex items-center flex-shrink-0 self-start md:self-center">
                <a class="flex items-end gap-3 group cursor-pointer" href="index.html">
                    <div class="flex flex-col justify-center -ml-1 pb-1">
                        <img src="images/logo-cosmos.png" alt="Farmacia Cosmos"
                            class="main-site-logo h-10 md:h-20 w-auto object-contain opacity-0 transition-opacity duration-500" />
                    </div>
                </a>
            </div>

            <div class="w-full lg:flex-grow lg:max-w-xl mx-auto order-last md:order-none mt-2 md:mt-0 relative z-10">
                <div class="relative group" id="search-container">
                    <input id="search-input"
                        class="w-full h-10 md:h-12 pl-4 md:pl-6 pr-20 md:pr-24 rounded-full text-sm md:text-base text-gray-700 bg-gray-50 border border-gray-200 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary shadow-sm dark:bg-gray-700 dark:border-gray-600 dark:text-white placeholder-gray-400 font-medium transition-all"
                        placeholder="Buscar productos..." type="text" autocomplete="off" />

                    <button id="clear-search"
                        class="absolute right-10 md:right-12 top-0 bottom-0 text-gray-400 hover:text-gray-600 dark:text-gray-500 dark:hover:text-gray-300 transition-colors flex items-center justify-center w-8 hidden">
                        <span class="material-icons text-lg">close</span>
                    </button>

                    <button id="btn-search-main"
                        class="absolute right-1 top-1 bottom-1 w-8 h-8 md:w-10 md:h-10 bg-primary hover:bg-primary-dark rounded-full text-white transition-colors flex items-center justify-center shadow-sm">
                        <span class="material-icons text-lg md:text-xl">search</span>
                    </button>

                    <div id="search-results-modal" class="absolute top-full left-1/2 -translate-x-1/2 mt-4 
                               w-[95vw] max-w-6xl 
                               bg-white dark:bg-surface-dark rounded-2xl shadow-2xl border border-gray-100 dark:border-gray-700 
                               z-50 flex flex-col md:flex-row overflow-hidden hidden transition-all duration-300">

                        <div class="flex-[2] flex flex-col min-w-0 bg-white dark:bg-surface-dark">
                            <div
                                class="px-6 py-3 border-b border-gray-50 dark:border-gray-800 flex justify-between items-center bg-gray-50/30 dark:bg-gray-800/20">
                                <h4 class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Productos
                                    Sugeridos</h4>
                            </div>
                            <div id="suggested-products"
                                class="max-h-[500px] overflow-y-auto divide-y divide-gray-50 dark:divide-gray-800 custom-scrollbar">
                            </div>
                        </div>

                        <div
                            class="flex-1 flex flex-col divide-y divide-gray-100 dark:divide-gray-800 bg-gray-50/50 dark:bg-gray-800/30 border-l border-gray-100 dark:border-gray-700">

                            <div class="p-5 flex flex-col min-h-0">
                                <h4 class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-3">
                                    Categorías relacionadas
                                </h4>
                                <div class="max-h-[220px] overflow-y-auto custom-scrollbar">
                                    <ul id="suggested-brands" class="grid grid-cols-1 gap-1"></ul>
                                </div>
                            </div>

                            <div class="p-5 flex flex-col min-h-0">
                                <h4 class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-3">
                                    Subcategorías específicas</h4>
                                <div class="max-h-[220px] overflow-y-auto custom-scrollbar">
                                    <ul id="suggested-categories" class="grid grid-cols-1 gap-1"></ul>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div
                class="flex items-center gap-4 md:gap-6 flex-shrink-0 self-end md:self-center absolute top-4 right-4 md:static">
                <a class="relative group flex items-center gap-2 cursor-pointer" onclick="toggleCart()">
                    <div
                        class="bg-secondary/30 dark:bg-white/10 p-2 rounded-full group-hover:bg-secondary/50 dark:group-hover:bg-white/20 transition-colors relative">
                        <span class="material-icons text-xl md:text-2xl text-primary shopping_cart">shopping_cart</span>
                        <span id="header-cart-count"
                            class="absolute -top-1 -right-1 h-4 w-4 md:h-5 md:w-5 bg-primary text-white rounded-full flex items-center justify-center text-[10px] font-bold border-2 border-white dark:border-surface-dark">
                            0
                        </span>
                    </div>
                    <div class="hidden xl:flex flex-col">
                        <span class="text-xs text-gray-500 dark:text-gray-400 font-medium leading-none mb-1">Mi
                            Carrito</span>
                        <span id="header-cart-total"
                            class="text-sm font-bold text-gray-800 dark:text-gray-200 leading-none group-hover:text-primary transition-colors">
                            Bs 0.00
                        </span>
                    </div>
                </a>
            </div>
        </div>
    </div>
</div>
